<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaussian IQ Width Ratio</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      html,
      body {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
        overflow: hidden;
        scrollbar-width: none;
      }

      body::-webkit-scrollbar {
        display: none;
      }

      .layout {
        max-width: 1040px;
        margin: 10px auto;
        padding: 8px 16px 10px;
        box-sizing: border-box;
        overflow: hidden;
      }

      .chart-wrap {
        position: relative;
        background: #0b1220;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 12px;
      }

      #chart {
        width: 100%;
        height: auto;
        display: block;
        background: #0b1220;
      }

      .info-box {
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(245, 158, 11, 0.2);
        border: 1px solid rgba(245, 158, 11, 0.4);
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-line;
      }

      .controls {
        margin-top: 10px;
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 14px;
        color: #d1d5db;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #10b981;
      }

      input[type="number"] {
        width: 200px;
        margin-left: 6px;
        padding: 2px 6px;
        box-sizing: border-box;
        border: 1px solid #4b5563;
        border-radius: 6px;
        background: #111827;
        color: #e5e7eb;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="chart-wrap">
        <canvas id="chart" width="980" height="460"></canvas>
        <div id="info" class="info-box"></div>
      </section>

      <section class="controls">
        <label for="iqSigmaValue">IQ sigma: <input id="iqSigmaValue" type="number" min="1" step="any" value="15" /></label>

        <label for="percent">Percent %: <input id="percentValue" type="number" min="0" max="100" step="any" value="68.2689" /></label>
        <input id="percent" type="range" min="0" max="100" step="any" value="68.2689" />

        <label for="zSigma">z: <input id="zSigmaValue" type="number" min="0" max="6" step="any" value="1.0000" /></label>
        <input id="zSigma" type="range" min="0" max="6" step="any" value="1.0000" />

        <label for="maxZ">Max z: <input id="maxZValue" type="number" min="2" max="8" step="any" value="6.0" /></label>
        <input id="maxZ" type="range" min="2" max="8" step="any" value="6" />
      </section>
    </main>

    <script>
      const iqMean = 100;
      const minSigma = 0;

      const canvas = document.getElementById("chart");
      const ctx = canvas.getContext("2d");
      const info = document.getElementById("info");

      const percentInput = document.getElementById("percent");
      const zSigmaInput = document.getElementById("zSigma");
      const maxZInput = document.getElementById("maxZ");

      const iqSigmaValue = document.getElementById("iqSigmaValue");
      const percentValue = document.getElementById("percentValue");
      const zSigmaValue = document.getElementById("zSigmaValue");
      const maxZValue = document.getElementById("maxZValue");

      const valuePairs = [
        { editor: percentValue, slider: percentInput, source: "percent", key: "percent" },
        { editor: zSigmaValue, slider: zSigmaInput, source: "z", key: "zSigma" },
        { editor: maxZValue, slider: maxZInput, source: "maxZ", key: "maxZ" },
      ];

      const values = {
        iqSigma: Number(iqSigmaValue.value),
        percent: Number(percentValue.value),
        zSigma: Number(zSigmaValue.value),
        maxZ: Number(maxZValue.value),
      };

      function normalPdf(x) {
        return (1 / Math.sqrt(2 * Math.PI)) * Math.exp(-0.5 * x * x);
      }

      function simpsonArea(fn, a, b) {
        const c = (a + b) / 2;
        return ((b - a) / 6) * (fn(a) + 4 * fn(c) + fn(b));
      }

      function adaptiveSimpson(fn, a, b, epsilon, whole, depth) {
        const c = (a + b) / 2;
        const left = simpsonArea(fn, a, c);
        const right = simpsonArea(fn, c, b);
        const delta = left + right - whole;
        if (depth <= 0 || Math.abs(delta) <= 15 * epsilon) {
          return left + right + delta / 15;
        }
        return (
          adaptiveSimpson(fn, a, c, epsilon / 2, left, depth - 1) +
          adaptiveSimpson(fn, c, b, epsilon / 2, right, depth - 1)
        );
      }

      function gaussianWidthRatio(stdDevs) {
        if (stdDevs <= 0) {
          return 0;
        }
        if (stdDevs >= 10) {
          return 1;
        }
        const halfArea = adaptiveSimpson(normalPdf, 0, stdDevs, 1e-14, simpsonArea(normalPdf, 0, stdDevs), 24);
        return Math.min(Math.max(2 * halfArea, 0), 1);
      }

      function ratioToSigma(ratio, zMax) {
        if (ratio <= 0) {
          return 0;
        }
        if (ratio >= 1) {
          return zMax;
        }
        const target = Math.min(Math.max(ratio, Number.MIN_VALUE), 1 - Number.EPSILON);
        let lo = minSigma;
        let hi = zMax;
        for (let i = 0; i < 60; i += 1) {
          const mid = (lo + hi) / 2;
          const value = gaussianWidthRatio(mid);
          if (value < target) {
            lo = mid;
          } else {
            hi = mid;
          }
        }
        return (lo + hi) / 2;
      }

      function clampToInput(value, input) {
        const min = Number(input.min);
        const max = Number(input.max);
        let next = Number(value);
        if (!Number.isFinite(next)) {
          next = Number(input.value);
        }
        if (Number.isFinite(min)) {
          next = Math.max(next, min);
        }
        if (Number.isFinite(max)) {
          next = Math.min(next, max);
        }
        return next;
      }

      function setSliderPreview(slider, value) {
        slider.value = clampToInput(value, slider);
      }

      function commitValueEditor(editor, slider, source, key) {
        values[key] = clampToInput(editor.value, editor);
        editor.value = String(values[key]);
        setSliderPreview(slider, values[key]);
        syncAndRender(source);
      }

      function commitIqSigmaValue() {
        const value = Number(iqSigmaValue.value);
        values.iqSigma = Number.isFinite(value) ? Math.max(value, 1) : 1;
        iqSigmaValue.value = String(values.iqSigma);
        syncAndRender("iq");
      }

      function drawChart(sigma, zMax) {
        const width = canvas.width;
        const height = canvas.height;
        const left = 58;
        const right = 20;
        const top = 20;
        const bottom = 44;
        const plotW = width - left - right;
        const plotH = height - top - bottom;

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#0b1220";
        ctx.fillRect(0, 0, width, height);

        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 6; i += 1) {
          const y = top + (plotH / 6) * i;
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(left + plotW, y);
          ctx.stroke();
        }

        ctx.strokeStyle = "#475569";
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left, top + plotH);
        ctx.lineTo(left + plotW, top + plotH);
        ctx.stroke();

        const xToPx = (x) => left + ((x + zMax) / (2 * zMax)) * plotW;
        const yToPx = (y) => top + plotH - (y / 0.45) * plotH;

        ctx.strokeStyle = "rgba(148, 163, 184, 0.35)";
        ctx.lineWidth = 1;
        const startInt = Math.ceil(-zMax);
        const endInt = Math.floor(zMax);
        for (let xMark = startInt; xMark <= endInt; xMark += 1) {
          const px = xToPx(xMark);
          ctx.beginPath();
          ctx.moveTo(px, top);
          ctx.lineTo(px, top + plotH);
          ctx.stroke();
        }

        const sampleCount = 1200;
        const step = (2 * zMax) / sampleCount;

        ctx.beginPath();
        for (let i = 0; i <= sampleCount; i += 1) {
          const x = -zMax + step * i;
          const y = normalPdf(x);
          const px = xToPx(x);
          const py = yToPx(y);
          if (i === 0) {
            ctx.moveTo(px, py);
          } else {
            ctx.lineTo(px, py);
          }
        }
        ctx.strokeStyle = "#38bdf8";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        let started = false;
        for (let i = 0; i <= sampleCount; i += 1) {
          const x = -zMax + step * i;
          if (x < -sigma || x > sigma) {
            continue;
          }
          const y = normalPdf(x);
          const px = xToPx(x);
          const py = yToPx(y);
          if (!started) {
            ctx.moveTo(px, yToPx(0));
            ctx.lineTo(px, py);
            started = true;
          } else {
            ctx.lineTo(px, py);
          }
        }
        if (started) {
          ctx.lineTo(xToPx(sigma), yToPx(0));
          ctx.closePath();
          ctx.fillStyle = "rgba(16, 185, 129, 0.35)";
          ctx.fill();
        }

        ctx.fillStyle = "#e5e7eb";
        ctx.font = "12px Segoe UI";
        for (let xLabel = startInt; xLabel <= endInt; xLabel += 1) {
          const px = xToPx(xLabel);
          const offset = xLabel >= 0 ? 4 : 8;
          ctx.fillText(String(xLabel), px - offset, top + plotH + 18);
        }
        ctx.fillText("z", left + plotW + 6, top + plotH + 4);
      }

      function syncAndRender(source = "percent") {
        const iqSigma = values.iqSigma;
        const zMax = values.maxZ;
        zSigmaInput.max = String(zMax);
        zSigmaValue.max = String(zMax);

        let ratio;
        let sigma;

        if (source === "z" || source === "maxZ") {
          sigma = values.zSigma;
          sigma = Math.min(Math.max(sigma, minSigma), zMax);
          ratio = gaussianWidthRatio(sigma);
          values.percent = ratio * 100;
          setSliderPreview(percentInput, values.percent);
        } else {
          ratio = Math.min(Math.max(values.percent / 100, 0), 1);
          sigma = ratioToSigma(ratio, zMax);
          sigma = Math.min(Math.max(sigma, minSigma), zMax);
          ratio = gaussianWidthRatio(sigma);
          values.percent = ratio * 100;
        }

        values.zSigma = sigma;
        setSliderPreview(zSigmaInput, sigma);

        const inverseRatio = (1 - ratio) * 100;
        const iqLow = iqMean - sigma * iqSigma;
        const iqHigh = iqMean + sigma * iqSigma;

        iqSigmaValue.value = String(iqSigma);
        percentValue.value = String(values.percent);
        zSigmaValue.value = String(sigma);
        maxZValue.value = String(zMax);

        info.textContent =
          `z = ${sigma}\n` +
          `max z = ${zMax}\n` +
          `ratio = ${(ratio * 100).toFixed(4)}% (inverse ${inverseRatio.toFixed(4)}%)\n` +
          `IQ sigma = ${iqSigma}\n` +
          `IQ range = ${iqLow} ~ ${iqHigh}`;

        drawChart(sigma, zMax);
      }

      percentInput.addEventListener("input", () => {
        values.percent = Number(percentInput.value);
        syncAndRender("percent");
      });
      zSigmaInput.addEventListener("input", () => {
        values.zSigma = Number(zSigmaInput.value);
        syncAndRender("z");
      });
      maxZInput.addEventListener("input", () => {
        values.maxZ = Number(maxZInput.value);
        syncAndRender("maxZ");
      });

      iqSigmaValue.addEventListener("change", commitIqSigmaValue);
      iqSigmaValue.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          iqSigmaValue.blur();
        }
      });

      for (const { editor, slider, source, key } of valuePairs) {
        editor.addEventListener("change", () => commitValueEditor(editor, slider, source, key));
        editor.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            editor.blur();
          }
        });
      }

      syncAndRender();
    </script>
  </body>
</html>
